Set-Content nginx\nginx.conf "upstream django_v1 {
    server web:8000;
}

upstream flask_v2 {
    server pagos_flask:5000;
}

server {
    listen 80;

    location /api/v1/ {
        proxy_pass http://django_v1;
        proxy_set_header Host `$host;
    }

    location /api/v2/comprar {
        proxy_pass http://flask_v2;
        proxy_set_header Host `$host;
    }
}"